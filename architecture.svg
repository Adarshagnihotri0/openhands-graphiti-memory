<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1000 700">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="memoryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="openhandsGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="700" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff">
    OpenHands Memory System Architecture
  </text>
  <text x="500" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#aaa">
    Separation of Memory (Knowledge) vs. Code Index (Repository)
  </text>
  
  <!-- OpenHands Box -->
  <rect x="350" y="100" width="300" height="70" rx="10" fill="url(#openhandsGradient)" filter="url(#shadow)"/>
  <text x="500" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">
    OpenHands Agent
  </text>
  <text x="500" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">
    Task Orchestration
  </text>
  
  <!-- MCP Orchestrator Box -->
  <rect x="350" y="220" width="300" height="50" rx="8" fill="#2d3748" filter="url(#shadow)" opacity="0.9"/>
  <text x="500" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">
    MCP Orchestrator
  </text>
  
  <!-- Connection Lines -->
  <line x1="500" y1="170" x2="500" y2="220" stroke="#4facfe" stroke-width="3" opacity="0.7"/>
  <line x1="350" y1="270" x2="300" y2="320" stroke="#667eea" stroke-width="3" opacity="0.7"/>
  <line x1="650" y1="270" x2="700" y2="320" stroke="#f093fb" stroke-width="3" opacity="0.7"/>
  
  <!-- Distributor Circle -->
  <circle cx="500" cy="270" r="10" fill="#fff" opacity="0.8"/>
  
  <!-- Graphiti Memory Box -->
  <rect x="50" y="320" width="500" height="200" rx="12" fill="#1e1e3f" filter="url(#shadow)" stroke="url(#memoryGradient)" stroke-width="3"/>
  
  <!-- Memory Title -->
  <rect x="50" y="320" width="500" height="45" rx="12" fill="url(#memoryGradient)"/>
  <text x="300" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff">
    Graphiti Memory (Knowledge)
  </text>
  <text x="300" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ddd">
    WHAT WE'VE LEARNED
  </text>
  
  <!-- Memory Items -->
  <g font-family="Arial, sans-serif" font-size="13">
    <text x="80" y="400" fill="#a0aec0">✓</text>
    <text x="100" y="400" fill="#667eea">Architecture</text>
    <text x="200" y="400" fill="#cbd5e0" font-size="11">Service dependencies, data flows</text>
    
    <text x="80" y="425" fill="#a0aec0">✓</text>
    <text x="100" y="425" fill="#667eea">Decisions</text>
    <text x="200" y="425" fill="#cbd5e0" font-size="11">Rationale, trade-offs</text>
    
    <text x="80" y="450" fill="#a0aec0">✓</text>
    <text x="100" y="450" fill="#667eea">Bug Fixes</text>
    <text x="200" y="450" fill="#cbd5e0" font-size="11">Root causes, solutions</text>
    
    <text x="80" y="475" fill="#a0aec0">✓</text>
    <text x="100" y="475" fill="#667eea">Conventions</text>
    <text x="200" y="475" fill="#cbd5e0" font-size="11">Patterns, best practices</text>
    
    <text x="80" y="500" fill="#a0aec0">✓</text>
    <text x="100" y="500" fill="#667eea">Relationships</text>
    <text x="200" y="500" fill="#cbd5e0" font-size="11">Entity connections</text>
  </g>
  
  <!-- What NOT to Store -->
  <g font-family="Arial, sans-serif" font-size="12">
    <text x="420" y="400" fill="#e53e3e">✗</text>
    <text x="440" y="400" fill="#a0aec0">Source code</text>
    
    <text x="420" y="425" fill="#e53e3e">✗</text>
    <text x="440" y="425" fill="#a0aec0">Functions</text>
    
    <text x="420" y="450" fill="#e53e3e">✗</text>
    <text x="440" y="450" fill="#a0aec0">Classes</text>
    
    <text x="420" y="475" fill="#e53e3e">✗</text>
    <text x="440" y="475" fill="#a0aec0">Code snippets</text>
  </g>
  
  <!-- Code Index Box -->
  <rect x="700" y="320" width="260" height="200" rx="12" fill="#1e1e3f" filter="url(#shadow)" stroke="url(#codeGradient)" stroke-width="3"/>
  
  <!-- Code Index Title -->
  <rect x="700" y="320" width="260" height="45" rx="12" fill="url(#codeGradient)"/>
  <text x="830" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff">
    Code Index
  </text>
  <text x="830" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ddd">
    WHAT EXISTS
  </text>
  
  <!-- Code Index Items -->
  <g font-family="Arial, sans-serif" font-size="13">
    <text x="730" y="400" fill="#f093fb">▸</text>
    <text x="750" y="400" fill="#f093fb">Symbols</text>
    <text x="730" y="425" fill="#f093fb">▸</text>
    <text x="750" y="425" fill="#f093fb">Functions</text>
    <text x="730" y="450" fill="#f093fb">▸</text>
    <text x="750" y="450" fill="#f093fb">Classes</text>
    <text x="730" y="475" fill="#f093fb">▸</text>
    <text x="750" y="475" fill="#f093fb">References</text>
    <text x="730" y="500" fill="#f093fb">▸</text>
    <text x="750" y="500" fill="#f093fb">Call Graph</text>
  </g>
  
  <!-- Database Icons -->
  <!-- Neo4j/FalkorDB -->
  <rect x="150" y="550" width="150" height="50" rx="8" fill="#2d3748" filter="url(#shadow)"/>
  <text x="225" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">
    Neo4j/FalkorDB
  </text>
  
  <!-- Symbols DB -->
  <rect x="775" y="550" width="150" height="50" rx="8" fill="#2d3748" filter="url(#shadow)"/>
  <text x="850" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">
    Symbols DB
  </text>
  
  <!-- Connection Lines -->
  <line x1="225" y1="520" x2="225" y2="550" stroke="#667eea" stroke-width="2" opacity="0.7"/>
  <line x1="850" y1="520" x2="850" y2="550" stroke="#f093fb" stroke-width="2" opacity="0.7"/>
  
  <!-- Retrieval Flow -->
  <rect x="150" y="630" width="700" height="50" rx="8" fill="#2d3748" opacity="0.8"/>
  <text x="500" y="660" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">
    Retrieval Policy: Query Graphiti (knowledge) + Query Code Index (code) → Merge Context
  </text>
  
  <!-- Legend -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="200" height="90" rx="8" fill="#2d3748" opacity="0.9"/>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">
      Memory Types
    </text>
    
    <rect x="10" y="30" width="12" height="12" fill="#667eea" rx="2"/>
    <text x="30" y="40" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e0">Architecture</text>
    
    <rect x="10" y="50" width="12" height="12" fill="#764ba2" rx="2"/>
    <text x="30" y="60" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e0">Decisions</text>
    
    <rect x="100" y="30" width="12" height="12" fill="#f093fb" rx="2"/>
    <text x="120" y="40" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e0">Bug Fixes</text>
    
    <rect x="100" y="50" width="12" height="12" fill="#f5576c" rx="2"/>
    <text x="120" y="60" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e0">Conventions</text>
  </g>
  
  <!-- Bounded Context Note -->
  <g transform="translate(750, 100)">
    <rect x="0" y="0" width="200" height="70" rx="8" fill="#feebc8" opacity="0.9"/>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#744210">
      ⚠ Important
    </text>
    <text x="100" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#744210">
      Memory stores KNOWLEDGE
    </text>
    <text x="100" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#744210">
      Code Index stores CODE
    </text>
  </g>
</svg>
